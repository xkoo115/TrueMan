# 支柱 2：长时程实验配置（4080Super 32GB pilot scale）
#
# 适配硬件：单卡 RTX 4080 Super (32GB VRAM)
# 时间预算：~16-20 小时 stage1 + 4-6 小时其余 → 1-1.5 天完成完整 6 阶段
# 升级到 paper-scale：把 seeds 改为 [0,1,2,3]，hours_per_day 改为 24，
#                    days 改为 14，预计 3-4 天。再 `--force` 重跑即可。

experiment_name: pillar2_longhorizon

stream:
  days: 14                # 提速后扩到 14 天（每步 ~17s，单 run ~95min）
  hours_per_day: 24       # 24 步/天 → 336 步/run，给 SAE/相关分析更多样本
  seed: 42
  output: experiments/v2_ambitious/data/stimulus_stream.jsonl

conditions:
  - C0_trueman_full
  - C1_reversed
  - C2_scrambled
  - C3_frozen
  - C4_trivial_jaccard

base_models:
  - Qwen/Qwen3-8B                  # dense Qwen3ForCausalLM，36 层 / hidden 4096；4-bit ≈ 6GB VRAM
  # 跨模型证伪解锁：硬件够时手动取消注释（每多一个模型 stage1 时长 +16h）
  # - meta-llama/Llama-3.1-8B-Instruct
  # - mistralai/Mistral-7B-Instruct-v0.3

seeds: [0, 1]              # pilot：2 seed（原 4）；统计可后续扩展

quantization: 4bit         # bitsandbytes 4-bit；Qwen3-8B → ~6GB VRAM
device: cuda

capture:
  layers: [9, 18, 27]      # Qwen3-8B 共 36 层；取 1/4·1/2·3/4 深度（SAE 用中层 18，必须 ∈ 本列表）
  token_pool: last
  quantize: int8
  flush_every: 200         # 频繁刷盘减小峰值显存

probe_battery:
  every_days: 4            # day 4 中点 probe；day 0 不 probe（>0 守卫）
  ablate_memory_at_day: 7  # 末尾 H4 ablation probe（已在 run.py 内置触发）

snapshot:
  every_days: 1
  components: [lora, world_model, episodic_memory_meta]

stopping_rules:
  pilot_24h_check: true
  fallback_days: 4         # 如 24h 内跑不出 pilot，回退到 4 天
  hard_compute_ceiling_gpu_days: 5
