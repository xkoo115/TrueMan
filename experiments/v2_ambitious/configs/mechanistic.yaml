# 支柱 1：机制因果实验配置（4080Super pilot scale）

experiment_name: pillar1_mechanistic

# 必须在 pillar2 跑完之后用其 captures.h5 训练 SAE
captures_source: experiments/v2_ambitious/results/longhorizon/C0_trueman_full_seed0_*/captures.h5

sae:
  layer: 16             # Qwen2.5-7B 共 28 层；中层 16 适合 monosemantic features
  dict_size: 8192       # pilot：原 16384 减半，降显存 + 训练时间
  top_k: 32             # pilot：原 64 减半
  epochs: 3             # pilot：原 5 → 3
  batch_size: 2048      # pilot：原 4096 减半（适配 32GB VRAM）
  lr: 3.0e-4
  output: experiments/v2_ambitious/results/mechanistic/sae_layer16.pt

probe_features:
  target: anxiety       # 主分析；surprise / boredom 作为补充
  top_k_features: 16
  bonferroni_alpha: 0.001
  output: experiments/v2_ambitious/results/mechanistic/features_anxiety.json

causal_intervention:
  layer: 16
  modes: ["clamp", "inject", "off"]   # off = 阴性对照（必须加引号：YAML 1.1 会把裸 off 解析成布尔 False）
  scalars: [1.0, 2.0]           # pilot：去掉 0.5（边缘效应弱）；保留主对比
  probe_set: experiments/v2_ambitious/data/probes/metacog_full.jsonl
  output_dir: experiments/v2_ambitious/results/mechanistic/intervention/
